body{

.header{
    display: flex;

    align-items: center;

.logo:hover{

.nav-links{

    align-items: center;
    top: 0;

    padding: 2px 40px;
    gap: 50px;
    list-style: none;
    font-size: 16px;
    
}
.nav-links li a{
    text-decoration: none;
    color: black;
    transition: color 0.2s ease in-out;
}
.nav-links li a:hover{
    cursor: pointer;
}
.hero{
    padding: 50px 100px 100px 100px;

input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    margin-top: 10px;
    border: 1px solid #8a8888;
    border-radius: 4px;
    box-sizing: border-box;
    resize: vertical;
}
.container{

    background-color: #f2f2f2;
    padding: 20px;

input[type=submit] {

    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
input[type=submit]:hover{
    background-color: rgb(72, 147, 180);
}
.link a{
    list-style: none;
    text-decoration: none;
    font-weight: 300;
    color: rgb(97, 181, 246);
}
.social_icon{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 30px;
}
.social_icon a{
    color: rgb(36, 83, 120);
}
.social_icon a:hover{
    color: rgb(46, 68, 85);
    transition: color 0.s ease in-out;

.footer{
